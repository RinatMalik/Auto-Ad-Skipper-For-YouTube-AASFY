<!DOCTYPE html>
<html>
<head>
  <!-- Character set + viewport for proper rendering in extension popup window. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Ad Skipper for YouTube (AASFY)</title>

  <!-- Popup styles. -->
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Popup heading + short purpose description. -->
  <h2>Auto Ad Skipper For YouTube (AASFY)</h2>
  <p>
    Automatically mutes and fast-forwards YouTube ads at 16x speed for a seamless viewing experience.
  </p>

  <!-- Ad counter stats. -->
  <div class="ad-stats">
    <div class="stat">
      <span class="stat-value" id="sessionAdCount">0</span>
      <span class="stat-label">This session</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="lifetimeAdCount">0</span>
      <span class="stat-label">All time</span>
    </div>
  </div>

  <!-- Activation status row with state pill and toggle button. -->
  <div class="row">
    <span id="statusPill" class="pill">Status: Loading...</span>
    <button id="activateButton">Activate</button>
  </div>

  <!-- Debug mode toggle used to enable verbose console logs. -->
  <label class="debug-toggle">
    <input type="checkbox" id="debugToggle">
    Enable debug mode
  </label>

  <!-- Build serial helps confirm the currently loaded extension build. -->
  <p id="buildSerialLabel" class="build-serial">Build serial: loading...</p>

  <!-- Popup behavior script. -->
  <script src="popup.js"></script>
</body>
</html>
