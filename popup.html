<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Ad Skipper for YouTube (AASFY)</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h2>Auto Ad Skipper For YouTube (AASFY)</h2>
  <p>
    This extension watches for YouTube ad skip controls and clicks them when available.
  </p>

  <div class="row">
    <span id="statusPill" class="pill">Status: Loading...</span>
    <button id="activateButton">Activate</button>
  </div>

  <label class="debug-toggle">
    <input type="checkbox" id="debugToggle">
    Enable debug mode
  </label>

  <section class="custom-identifiers">
    <h3>Custom selector / identifier</h3>
    <p class="help-text">
      Add a CSS selector (for example <code>.my-new-skip-button</code>) or text hint (for example <code>skip now</code>).
    </p>
    <div class="input-row">
      <input id="customIdentifierInput" type="text" placeholder="Enter selector or text hint">
      <button id="addIdentifierButton" type="button">Add</button>
    </div>
    <ul id="identifierList"></ul>
  </section>

  <script src="popup.js"></script>
</body>
</html>
